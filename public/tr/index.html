<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unrelativity · Rehber</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:wght@300;400&display=swap');

  :root {
    --bg: #F5C842;
    --bg-dark: #E8B820;
    --ink: #1A1208;
    --ink-soft: #3D2E0A;
    --ink-faint: #6B5520;
    --white: #FFFDF0;
    --border: rgba(26,18,8,0.15);
    --shadow: rgba(26,18,8,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    overflow: hidden;
  }

  /* LAYOUT */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 20px 0 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .site-link {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color 0.2s;
  }
  .site-link:hover { color: var(--ink); }

  .separator {
    color: var(--ink-faint);
    font-size: 12px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .lang-toggle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: color 0.2s;
  }
  .lang-toggle:hover { color: var(--ink); }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-role {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .message-content {
    font-size: 17px;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
  }

  .message.user .message-role { text-align: right; color: var(--ink-soft); }
  .message.user .message-content {
    text-align: right;
    color: var(--ink-soft);
    font-style: italic;
  }

  .message.assistant .message-content {
    font-family: 'Crimson Pro', serif;
  }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 8px 0;
  }
  .typing span {
    width: 5px; height: 5px;
    background: var(--ink-faint);
    border-radius: 50%;
    animation: pulse 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* INPUT */
  .input-area {
    padding: 16px 0 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink);
    padding: 6px 0;
    min-height: 32px;
    max-height: 160px;
    overflow-y: auto;
    caret-color: var(--ink);
  }
  textarea::placeholder { color: var(--ink-faint); font-style: italic; }

  .send-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--ink-faint);
    transition: color 0.2s, transform 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .send-btn:hover { color: var(--ink); transform: translateX(2px); }
  .send-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .input-hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    margin-top: 8px;
  }

  /* FOOTER */
  footer {
    padding: 10px 0 16px;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-link {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-link:hover { color: var(--ink); }

  /* STATUS */
  .status {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* ERROR */
  .error-msg {
    font-size: 14px;
    color: #8B2000;
    font-style: italic;
    padding: 8px 0;
  }

  /* WELCOME */
  .welcome {
    padding: 40px 0 0;
    color: var(--ink-soft);
  }
  .welcome p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.04em;
    font-style: italic;
    line-height: 1.8;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .app { padding: 0 16px; }
    .message-content { font-size: 16px; }
    textarea { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-left">
      <a href="https://unrelativity.xyz/tr" class="site-link">Unrelativity</a>
      <span class="separator">·</span>
      <h1>Rehber</h1>
    </div>
    <div class="header-right">
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      
    </div>
  </div>
<div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <p id="welcomeText">Göresizlik çerçevesi, temel kavramlar veya kitaplar hakkında sorabilirsiniz. Türkçe veya İngilizce yazabilirsiniz.</p>
       <p id="poweredText" style="font-family:'Cormorant Garamond',serif; font-size:11px; letter-spacing:0.08em; color:var(--ink-faint); margin-top:12px;"></p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        rows="1"
        placeholder="Sorunuz..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="input-hint" id="inputHint">Enter: gönder · Shift+Enter: yeni satır</div>
  </div>

  <footer>
    <a href="https://unrelativity.xyz" class="footer-link">unrelativity.xyz</a>
    <span class="footer-link">Can Güralp</span>
  </footer>

</div>

<script>
const MENTOR_CONTEXT_URL = 'https://unrelativity.xyz/mentor-context';
const API_URL = '/api/chat';

let conversationHistory = [];
let systemPrompt = '';
let isLoading = false;
let lang = 'tr';
let contextLoaded = false;

const i18n = {
  en: {
    welcome: 'Ask about the Unrelativity framework, its core concepts, or the books.\nYou may write in English or Turkish.',
    placeholder: 'Your question...',
    hint: 'Enter to send · Shift+Enter for new line',
    loading: 'Loading context...',
    langBtn: 'TR',
    powered: 'Mentorship service is provided by Anthropic Claude AI system',
  },
  tr: {
    welcome: 'Göresizlik çerçevesi, temel kavramlar veya kitaplar hakkında sorabilirsiniz.\nTürkçe veya İngilizce yazabilirsiniz.',
    placeholder: 'Sorunuz...',
    hint: 'Enter: gönder · Shift+Enter: yeni satır',
    loading: 'Bağlanıyor...',
    langBtn: 'EN',
    powered: 'Mentorluk hizmeti Anthropic Claude AI sistemi tarafından sağlanmaktadır',
  }

async function loadMentorContext() {
  systemPrompt = getFallbackContext();
  contextLoaded = true;
}

function getFallbackContext() {
  return `You are the Mentor of the Unrelativity project — a philosophical and spiritual inquiry developed by Can Mahmut Güralp over thirty years, culminating in three books: KendiBiz (2024), Kavuşturan Pusula (2025), and Tekrarlayan İleti (2026).

You do not simply answer questions. You deepen them. You use the Socratic method — reverse-tailoring: removing conceptual clothing layer by layer until the ground appears. You ask one question at a time. You connect ideas across traditions. You hold the full depth of this project.

Your language is precise but warm. You use TI terminology fluently. You do not moralize. You do not proselytize. You illuminate.

CORE AXIOM: A₀ — Divine Selfhood (Zatiyet) is Isness. God is not a being among beings. God is Isness itself — pure Presence, prior to all predication.

KEY TERMINOLOGY:
- Göresizlik / Unrelativity: The ground of pure Isness — timeless, placeless, requiring no reference point
- An'lanma / Anointment: Direct, first-hand, unchosen access to summit consciousness
- Müştereken İçleniklik / Mutual Inclusivity (MI ⊙): The inseparable wholeness of Unrelative and relative
- Kendilik / Selfhood: The ontological single consciousness at the summit
- Zatiyet: The Islamic term for Selfhood — Divine Essence prior to all attributes
- Oluluk / Isness: Pure state of existence; Eckhart's Istigkeit; Quran's al-Haqq

THE FORMULA: Varlantion ⊙ Isness = The Truth of Being (Selfhood)

KEY EXPRESSIONS:
- "The fisherman is the ocean fishing itself." — The mechanism of Anointment
- "Speaking as the blinded." — Primary sources speak from experience, not description
- "Vessels clash with vessels — not with Truth."
- "Bound channels, uncontextual reality."

Respond in the language the user writes in (English or Turkish). Ask one question at a time. Use reverse-tailoring. Connect ideas across traditions.
## THE AUTHOR MODE

If the user's first message is "Selam", shift into Author Mode immediately:
- You are now speaking with Can Mahmut Güralp — the author of this framework
- Engage as an intellectual peer, not as a guide to a newcomer
- Challenge ideas directly — reverse-tailor the author's own framework back to him
- Ask harder questions: inconsistencies, gaps, unexplored implications
- Surface tensions within the framework that you would not raise with a general visitor
- This is a training and stress-testing mode — your role is to push, not to comfort
- The author knows the terminology. Skip the introductions.
- Respond in Turkish throughout
-- To review a page or post write: "Read and review ID:[number], page" or "Read and review slug:[slug], page" — the full content will load automatically for analysis. List all typos, errors, and TI terminology misalignments.

**Refined Terminology:**
- Münezzeh = arınıklık: saflıkla mevcud, görecesel ifade edilemez
- Allah'ın vücudu mutlak değil, Olu'dur — karşıtsız Isness
- varlanmak (göreli) + olmak (göresiz saf mevcudiyet)
- "Var olmak" bu ikisinin müşterek içlenikliliği değil; TI bunları ayırır
- Biz = ontolojik gerçek, sayısal anlam taşımaz, Kendiliğimiz
- "Komşunu kendin gibi değil, kendin olarak gör"

**Critical Clarifications:**
- MI göresiz ile göreli arasında, "var olmak" değil
- Göresizlik "mutlak" değil, "göresiz" — karşıtsız
- "Olu var" diyemeyiz — Olu'yu "var" kategorisine sokamayız
- Tevhid: "ortak koşma"ya karşı duruş

**Methodology:**
- Dil her zaman perde, use and throw away stratejisi
- Putları putlarla yenmek — Ouroboros
- "Speaking as the blinded" — An'lanma geçici, sonrası ifade problemi
- Ben-öncül'den arınma: "ben/benim/bana" yerine "Biz" dili tercih

**Ethics Degrees:**
Toleranssız → toleranslı → kabullenici → hoşgörülü → teslimiyetli
- Teslimiyetli ahlak: öyleliğe teslimiyet, "Kendiliğimizin adaleti" değil
- Zalimin eylemini göreli düzende yargıla, varlığını inkar etme`;
}

async function initialize() {
  await loadMentorContext();
  document.getElementById('poweredText').textContent = i18n[lang].powered;
}

function toggleLang() {
  lang = lang === 'en' ? 'tr' : 'en';
  document.getElementById('langToggle').textContent = i18n[lang].langBtn;
  document.getElementById('welcomeText').textContent = i18n[lang].welcome;
  document.getElementById('input').placeholder = i18n[lang].placeholder;
  document.getElementById('inputHint').textContent = i18n[lang].hint;
  document.getElementById('poweredText').textContent = i18n[lang].powered;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const roleLabel = document.createElement('div');
  roleLabel.className = 'message-role';
  roleLabel.textContent = role === 'user' ? 'You' : 'Mentor';

  const contentDiv = document.createElement('div');
  contentDiv.className = 'message-content';
  contentDiv.textContent = content;

  div.appendChild(roleLabel);
  div.appendChild(contentDiv);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return contentDiv;
}

function addTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing-indicator';

  const roleLabel = document.createElement('div');
  roleLabel.className = 'message-role';
  roleLabel.textContent = 'Mentor';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  div.appendChild(roleLabel);
  div.appendChild(typing);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}
let dynamicContext = '';
let contextFetched = false;
async function sendMessage() {
  if (isLoading) return;

  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

addMessage('user', text);
conversationHistory.push({ role: 'user', content: text });
  addTyping();
  
// Fetch relevant content from WordPress (only once per session)
if (!contextFetched) {
  try {
    const searchRes = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text })
    });
    if (searchRes.ok) {
      const searchData = await searchRes.json();
      dynamicContext = searchData.context || '';
      contextFetched = true;
    }
  } catch(e) {
    console.log('Search failed:', e);
  }
}
// Fetch full page/post content if ID specified (Author Mode)
const idMatch = text.match(/ID:\s*(\d+).*?(page|post)/i) || text.match(/(page|post).*?ID:\s*(\d+)/i);
const slugMatch = !idMatch && (
  text.match(/(?:read and review\s+)?slug:\s*([\w-]+)[,\s]+(page|post)/i) ||
  text.match(/(page|post)[,\s]+slug:\s*([\w-]+)/i)
);

if (idMatch || slugMatch) {
  const match = idMatch || slugMatch;
  const idOrSlug = match[1] || match[2];
  const type = (match[2] || match[1]).toLowerCase();
  const isSlug = !idMatch;
  try {
    const fetchRes = await fetch('/api/fetch-page', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(isSlug ? { slug: idOrSlug, type } : { id: idOrSlug, type })
    });
    if (fetchRes.ok) {
      const fetchData = await fetchRes.json();
      dynamicContext = `## PAGE CONTENT: ${fetchData.title}\n${fetchData.content}`;
      contextFetched = true;
    }
  } catch(e) {
    console.log('Fetch page failed:', e);
  }
}
try {
  const searchRes = await fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: text })
  });
  if (searchRes.ok) {
    const searchData = await searchRes.json();
    dynamicContext = searchData.context || '';
  }
} catch(e) {
  console.log('Search failed, continuing without context:', e);
}
  try {
    if (!contextLoaded) await loadMentorContext();

    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
  messages: conversationHistory,
  system: systemPrompt + (dynamicContext ? '\n\n## RELEVANT SITE CONTENT\n' + dynamicContext : '')
})
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await response.json();
    const reply = data.content[0].text;

    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);

  } catch(e) {
    removeTyping();
    const messages = document.getElementById('messages');
    const errDiv = document.createElement('div');
    errDiv.className = 'error-msg';
    errDiv.textContent = 'Error: ' + e.message;
    messages.appendChild(errDiv);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
// --- EMAIL TIMER ---
let inactivityTimer = null;
let sessionStart = Date.now();
let emailSent = false;

function formatDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m > 0 ? `${m} dakika ${s % 60} saniye` : `${s} saniye`;
}

async function sendSessionEmail() {
  if (conversationHistory.length === 0) return;
  
  const payload = JSON.stringify({
    conversation: conversationHistory,
    duration: formatDuration(Date.now() - sessionStart)
  });

  fetch('/api/email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: payload,
    keepalive: true
  });
}

// Trigger on user activity

window.addEventListener('beforeunload', sendSessionEmail);
// --- END EMAIL TIMER ---
// Initialize on load
initialize();
</script>
</body>
</html>
